<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>DSR 안전 복구</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: #0f1117;
      color: #e8eaf0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .card {
      background: #1a1d27;
      border: 1px solid #2a2d3a;
      border-radius: 16px;
      padding: 40px 48px;
      width: 480px;
      max-width: 95vw;
      box-shadow: 0 8px 32px rgba(0,0,0,.4);
    }

    h1 {
      font-size: 1.4rem;
      font-weight: 600;
      letter-spacing: .02em;
      margin-bottom: 32px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    h1 .dot {
      width: 10px; height: 10px;
      border-radius: 50%;
      background: #4caf50;
      flex-shrink: 0;
      transition: background .3s;
    }
    h1 .dot.err   { background: #f44336; animation: pulse 1s infinite; }
    h1 .dot.warn  { background: #ff9800; animation: pulse 1s infinite; }
    h1 .dot.ok    { background: #4caf50; }
    h1 .dot.grey  { background: #555; }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: .3; }
    }

    .row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 10px 0;
      border-bottom: 1px solid #2a2d3a;
    }
    .row:last-of-type { border-bottom: none; }
    .row .label { font-size: .82rem; color: #8a8fa8; }
    .row .value { font-size: .92rem; font-weight: 500; font-family: monospace; }

    /* Recovery state chip */
    .chip {
      display: inline-block;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: .78rem;
      font-weight: 600;
      letter-spacing: .04em;
      text-transform: uppercase;
    }
    .chip.idle     { background: #1e2636; color: #8a9cc8; }
    .chip.detected { background: #3a1a1a; color: #f44336; }
    .chip.manual   { background: #3a2a00; color: #ffb300; }
    .chip.restoring{ background: #1a2a1a; color: #66bb6a; }
    .chip.complete { background: #1a3020; color: #4caf50; }

    .error-msg {
      margin-top: 12px;
      padding: 10px 14px;
      background: #2a1515;
      border: 1px solid #552020;
      border-radius: 8px;
      font-size: .8rem;
      color: #ff8a80;
      font-family: monospace;
      word-break: break-all;
      display: none;
    }
    .error-msg.visible { display: block; }

    .btn-area {
      margin-top: 28px;
      display: flex;
      flex-direction: column;
      gap: 12px;
    }

    button {
      width: 100%;
      padding: 14px;
      border: none;
      border-radius: 10px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: opacity .2s, transform .1s;
    }
    button:active { transform: scale(.98); }
    button:disabled {
      opacity: .35;
      cursor: not-allowed;
      transform: none;
    }

    #btnComplete {
      background: #4caf50;
      color: #fff;
    }
    #btnComplete:not(:disabled):hover { background: #43a047; }

    #btnReset {
      background: #2a2d3a;
      color: #aab;
      font-size: .88rem;
      padding: 10px;
    }
    #btnReset:not(:disabled):hover { background: #34384a; }

    .status-note {
      margin-top: 8px;
      font-size: .78rem;
      color: #555;
      text-align: center;
      min-height: 1.2em;
    }

    .divider { margin: 20px 0; border: none; border-top: 1px solid #2a2d3a; }

    #wsStatus {
      font-size: .72rem;
      color: #444;
      text-align: right;
      margin-top: 20px;
    }
    #wsStatus.connected { color: #2e7d32; }
    #wsStatus.disconnected { color: #c62828; }
  </style>
</head>
<body>
<div class="card">
  <h1><span class="dot grey" id="statusDot"></span>DSR 안전 복구</h1>

  <div class="row">
    <span class="label">로봇 상태</span>
    <span class="value" id="robotStateStr">—</span>
  </div>
  <div class="row">
    <span class="label">서보 ON</span>
    <span class="value" id="servoOn">—</span>
  </div>
  <div class="row">
    <span class="label">복구 상태</span>
    <span class="value"><span class="chip idle" id="recoveryChip">IDLE</span></span>
  </div>

  <div class="error-msg" id="errorMsg"></div>

  <hr class="divider">

  <div class="btn-area">
    <button id="btnComplete" disabled onclick="onComplete()">✔ 복구 완료 (AUTONOMOUS 복귀)</button>
    <button id="btnReset" disabled onclick="onReset()">↺ 다음 감지 대기 (IDLE 리셋)</button>
  </div>

  <p class="status-note" id="statusNote">대기 중…</p>
  <p id="wsStatus" class="disconnected">● WebSocket 연결 중…</p>
</div>

<script>
  const CHIP_CLASS = {
    IDLE:           'idle',
    ERROR_DETECTED: 'detected',
    MANUAL_MODE:    'manual',
    RESTORING:      'restoring',
    COMPLETE:       'complete',
  };
  const CHIP_LABEL = {
    IDLE:           'IDLE',
    ERROR_DETECTED: '에러 감지',
    MANUAL_MODE:    'MANUAL 모드 (교시 가능)',
    RESTORING:      '복귀 중…',
    COMPLETE:       '복구 완료',
  };
  const DOT_CLASS = {
    IDLE:           'grey',
    ERROR_DETECTED: 'err',
    MANUAL_MODE:    'warn',
    RESTORING:      'ok',
    COMPLETE:       'ok',
  };
  const NOTE = {
    IDLE:           '정상 동작 중 — 에러 감지 대기',
    ERROR_DETECTED: '에러 감지 — MANUAL 모드 전환 중…',
    MANUAL_MODE:    '🟡 암 LED 황색 — 로봇을 안전 위치로 이동 후 복구 완료 버튼 클릭',
    RESTORING:      'AUTONOMOUS 모드 복귀 중…',
    COMPLETE:       '✅ 복구 완료 — IDLE 리셋 버튼으로 다음 감지를 준비하세요',
  };

  function applyState(s) {
    document.getElementById('robotStateStr').textContent =
      s.robot_state_str ?? '—';
    document.getElementById('servoOn').textContent =
      s.servo_on ? '✔ ON' : '✘ OFF';

    const rs = s.recovery_state ?? 'IDLE';
    const chip = document.getElementById('recoveryChip');
    chip.className = 'chip ' + (CHIP_CLASS[rs] ?? 'idle');
    chip.textContent = CHIP_LABEL[rs] ?? rs;

    const dot = document.getElementById('statusDot');
    dot.className = 'dot ' + (DOT_CLASS[rs] ?? 'grey');

    document.getElementById('statusNote').textContent = NOTE[rs] ?? '';

    // 에러 메시지
    const errEl = document.getElementById('errorMsg');
    if (s.error_message) {
      errEl.textContent = s.error_message;
      errEl.classList.add('visible');
    } else {
      errEl.classList.remove('visible');
    }

    // 버튼 활성화
    document.getElementById('btnComplete').disabled = (rs !== 'MANUAL_MODE');
    document.getElementById('btnReset').disabled    = (rs !== 'COMPLETE');
  }

  async function onComplete() {
    document.getElementById('btnComplete').disabled = true;
    document.getElementById('statusNote').textContent = '복구 완료 처리 중…';
    try {
      const res = await fetch('/api/recovery/complete', { method: 'POST' });
      const data = await res.json();
      if (!data.success) {
        document.getElementById('statusNote').textContent = '⚠ ' + data.message;
      }
    } catch (e) {
      document.getElementById('statusNote').textContent = '⚠ 요청 실패: ' + e;
    }
  }

  async function onReset() {
    document.getElementById('btnReset').disabled = true;
    await fetch('/api/recovery/reset', { method: 'POST' });
  }

  // ── WebSocket ─────────────────────────────────────────────────────────────
  let ws = null;
  let retryTimer = null;

  function connect() {
    const proto = location.protocol === 'https:' ? 'wss' : 'ws';
    ws = new WebSocket(`${proto}://${location.host}/ws`);

    ws.onopen = () => {
      document.getElementById('wsStatus').textContent = '● WebSocket 연결됨';
      document.getElementById('wsStatus').className = 'connected';
    };

    ws.onmessage = (ev) => {
      try { applyState(JSON.parse(ev.data)); } catch {}
    };

    ws.onclose = () => {
      document.getElementById('wsStatus').textContent = '● WebSocket 연결 끊김 — 재연결 중…';
      document.getElementById('wsStatus').className = 'disconnected';
      retryTimer = setTimeout(connect, 2000);
    };

    ws.onerror = () => ws.close();
  }

  connect();

  // 초기 상태 폴링 (WebSocket 연결 전)
  fetch('/api/state').then(r => r.json()).then(applyState).catch(() => {});
</script>
</body>
</html>
