calibration_motion_runner:
  ros__parameters:
    move_j_action: "/arm/move_j"
    velocity_deg_s: 15.0
    acceleration_deg_s2: 30.0
    settle_time_sec: 2.0
    start_delay_sec: 3.0
    take_sample_service: "/calibration/take_sample"
    sample_service_timeout_sec: 45.0
    home_service: "/arm/home"
    return_home_on_finish: true
    optimized_motion_path: "/home/cheol/RoToSY_ws/src/rotosy_calibration/config/optimized_calibration_motion.yaml"
    loop: false
    auto_start: true

    # Flat list: 6 joint values per pose, unit is degree.
    # These are conservative sample poses around the current home-style posture.
    # Verify every pose on the real robot before running unattended.
    joint_poses_deg: [
      # 홈
      0.0,  0.0, 90.0,  0.0, 90.0,  0.0,
      # J1 단독 (마커 위치 크게 바뀜)
      8.0,  0.0, 90.0,  0.0, 90.0,  0.0,
     -8.0,  0.0, 90.0,  0.0, 90.0,  0.0,
     12.0,  0.0, 90.0,  0.0, 90.0,  0.0,
    -12.0,  0.0, 90.0,  0.0, 90.0,  0.0,
      # J2/J3 단독
      0.0,  6.0, 90.0,  0.0, 90.0,  0.0,
      0.0, -6.0, 90.0,  0.0, 90.0,  0.0,
      0.0,  0.0, 97.0,  0.0, 90.0,  0.0,
      0.0,  0.0, 83.0,  0.0, 90.0,  0.0,
      # J4/J5 단독 (중간 강도)
      0.0,  0.0, 90.0, 12.0, 90.0,  0.0,
      0.0,  0.0, 90.0,-12.0, 90.0,  0.0,
      0.0,  0.0, 90.0,  0.0, 98.0,  0.0,
      0.0,  0.0, 90.0,  0.0, 82.0,  0.0,
      # J6 단독 — 마커 가시성 유지하면서 회전 다양성 최대화
      0.0,  0.0, 90.0,  0.0, 90.0, 20.0,
      0.0,  0.0, 90.0,  0.0, 90.0,-20.0,
      0.0,  0.0, 90.0,  0.0, 90.0, 35.0,
      0.0,  0.0, 90.0,  0.0, 90.0,-35.0,
      # J1 + J6 복합 (마커 위치·자세 동시 변화, 가시성 양호)
      8.0,  0.0, 90.0,  0.0, 90.0, 20.0,
      8.0,  0.0, 90.0,  0.0, 90.0,-20.0,
     -8.0,  0.0, 90.0,  0.0, 90.0, 20.0,
     -8.0,  0.0, 90.0,  0.0, 90.0,-20.0,
      # 중간 강도 복합 (극한 각도 제외)
      5.0, -4.0, 92.0, 10.0, 88.0, 15.0,
     -5.0,  4.0, 88.0,-10.0, 92.0,-15.0,
      7.0,  3.0, 88.0, -8.0, 88.0, 15.0,
     -7.0, -3.0, 92.0,  8.0, 92.0,-15.0,
      5.0, -4.0, 92.0, 10.0, 88.0,-15.0,
     -5.0,  4.0, 88.0,-10.0, 92.0, 15.0,
      8.0,  4.0, 88.0,  0.0, 88.0, 25.0,
     -8.0, -4.0, 92.0,  0.0, 92.0,-25.0,
      # J4 + J6
      0.0,  0.0, 90.0, 10.0, 90.0, 25.0,
      0.0,  0.0, 90.0,-10.0, 90.0,-25.0,
      0.0,  0.0, 90.0, 12.0, 85.0,-15.0,
      0.0,  0.0, 90.0,-12.0, 95.0, 15.0,
      # 홈 복귀
      0.0,  0.0, 90.0,  0.0, 90.0,  0.0
    ]
