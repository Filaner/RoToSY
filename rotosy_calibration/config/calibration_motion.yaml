calibration_motion_runner:
  ros__parameters:
    move_j_action: "/arm/move_j"
    velocity_deg_s: 15.0
    acceleration_deg_s2: 30.0
    settle_time_sec: 1.2
    start_delay_sec: 3.0
    take_sample_service: "/calibration/take_sample"
    sample_service_timeout_sec: 45.0
    home_service: "/arm/home"
    return_home_on_finish: true
    optimized_motion_path: "/home/gyurangs/ros2_ws/src/RoToSY/rotosy_calibration/config/optimized_calibration_motion.yaml"
    loop: false
    auto_start: true

    # Flat list: 6 joint values per pose, unit is degree.
    # These are conservative sample poses around the current home-style posture.
    # Verify every pose on the real robot before running unattended.
    joint_poses_deg: [
      0.0,  0.0, 90.0,   0.0,  90.0,   0.0,
      5.0,  0.0, 90.0,   0.0,  90.0,   0.0,
     -5.0,  0.0, 90.0,   0.0,  90.0,   0.0,
      0.0,  5.0, 90.0,   0.0,  90.0,   0.0,
      0.0, -5.0, 90.0,   0.0,  90.0,   0.0,
      0.0,  0.0, 95.0,   0.0,  90.0,   0.0,
      0.0,  0.0, 85.0,   0.0,  90.0,   0.0,
      0.0,  0.0, 90.0,  10.0,  90.0,   0.0,
      0.0,  0.0, 90.0, -10.0,  90.0,   0.0,
      0.0,  0.0, 90.0,   0.0, 100.0,   0.0,
      0.0,  0.0, 90.0,   0.0,  80.0,   0.0,
      0.0,  0.0, 90.0,   0.0,  90.0,  15.0,
      0.0,  0.0, 90.0,   0.0,  90.0, -15.0,
      5.0, -3.0, 92.0,   8.0,  95.0,  10.0,
     -5.0,  3.0, 88.0,  -8.0,  85.0, -10.0
    ]
